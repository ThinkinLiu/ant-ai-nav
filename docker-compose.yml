# 蚂蚁AI导航 - Docker Compose 配置
#
# 使用方法：
#   docker-compose up -d --build
#
# 注意：数据库配置在首次访问时通过 /settings 页面设置

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ant-ai-nav:latest
    container_name: ant-ai-nav
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      # 持久化配置文件
      - ./config:/app/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
