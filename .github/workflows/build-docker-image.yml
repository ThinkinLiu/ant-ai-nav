name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
      image_tag:
        description: 'Image tag (e.g. latest, v1.0.0)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          fetch-depth: 1

      - name: Display Git info
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "Image tag: ${{ github.event.inputs.image_tag || 'latest' }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js application
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://demo.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'demo-key' }}

      - name: Build Docker image
        run: |
          docker build -t ant-ai-nav:${{ github.event.inputs.image_tag || 'latest' }} .
          docker tag ant-ai-nav:${{ github.event.inputs.image_tag || 'latest' }} ant-ai-nav:latest

      - name: Save Docker image
        run: |
          docker save ant-ai-nav:latest | gzip > docker-image.tar.gz

      - name: Display image info
        run: |
          echo "Image size:"
          ls -lh docker-image.tar.gz
          echo ""
          echo "Image info:"
          docker images ant-ai-nav

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar.gz
          retention-days: 7
