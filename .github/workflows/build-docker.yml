name: Build and Export Docker Image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build --no-cache -t ant-ai-nav:latest .
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          COZE_WORKLOAD_IDENTITY_API_KEY: ${{ secrets.COZE_WORKLOAD_IDENTITY_API_KEY }}
          COZE_WORKLOAD_IDENTITY_CLIENT_ID: ${{ secrets.COZE_WORKLOAD_IDENTITY_CLIENT_ID }}
          COZE_WORKLOAD_IDENTITY_CLIENT_SECRET: ${{ secrets.COZE_WORKLOAD_IDENTITY_CLIENT_SECRET }}
          COZE_INTEGRATION_BASE_URL: ${{ secrets.COZE_INTEGRATION_BASE_URL }}

      - name: Export Docker image
        run: |
          docker save ant-ai-nav:latest | gzip > ant-ai-nav.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: ant-ai-nav.tar.gz
          retention-days: 7
